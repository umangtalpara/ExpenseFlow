version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: expenseflow-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - expenseflow-network

  redis:
    image: redis:7-alpine
    container_name: expenseflow-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - expenseflow-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  expenseflow-network:
    driver: bridge
